<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Dashboard</h1><br>

    <h2>Moji zapiski:</h2>
    <ul>
        {% for note in notes %}
            <li>
                <a href="{{ url_for('editNote', note_index=loop.index0) }}">{{ note.title }}</a>
                <form action="/deleteNote/{{ loop.index0 }}" method="POST" style="display:inline;">
                    <button type="submit">Izbriši zapisek</button>
                </form>
            </li>
        {% endfor %}
    </ul>

    <h3>Dodaj nov zapisek:</h3>
    <form action="/saveNote" method="POST">
        <input type="text" name="title" placeholder="Naslov zapiska" required><br><br>
        <textarea name="note" cols="30" rows="10" required></textarea><br><br>
        <button type="submit">Shrani</button>
    </form>

    <a href="/logout">Odjavi</a>
</body>
</html>
