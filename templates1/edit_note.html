<!DOCTYPE html>
<html>
<head>
    <title>Uredi zapisek</title>
</head>
<body>
    <h1>Uredi zapisek: {{ note.title }}</h1><br>

    <form method="POST">
        <input type="text" name="title" value="{{ note.title }}" required><br><br>
        <textarea name="note" cols="30" rows="10" required>{{ note.content }}</textarea><br><br>
        <button type="submit">Shrani spremembe</button>
    </form>

        <form action="/clearNoteContent/{{ note_index }}" method="POST">
        <button type="submit">Počisti</button>
    </form>

    <a href="/dashboard">Nazaj na dashboard</a>
</body>
</html>
